<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI政策智能分析系统 - 2026年7月</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans SC', sans-serif; }
        .timeline-line { position: absolute; left: 24px; top: 0; bottom: 0; width: 2px; background: linear-gradient(to bottom, #3b82f6, #8b5cf6); }
        .timeline-dot { position: absolute; left: 18px; width: 14px; height: 14px; border-radius: 50%; background: white; border: 3px solid #3b82f6; z-index: 10; }
        .card-hover { transition: all 0.3s ease; }
        .card-hover:hover { transform: translateY(-4px); box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        .tab-active { border-bottom: 3px solid #3b82f6; color: #1d4ed8; font-weight: 600; }
        .keyword-tag { animation: fadeInUp 0.5s ease forwards; opacity: 0; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .chart-container { position: relative; height: 300px; }
        .pdf-page { page-break-after: always; }
        @media print { .no-print { display: none !important; } }
        .gradient-text { background: linear-gradient(135deg, #1e40af, #7c3aed); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .source-link { color: #2563eb; text-decoration: underline; cursor: pointer; }
        .source-link:hover { color: #1d4ed8; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <header class="bg-white shadow-lg sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center space-x-3">
                    <div class="w-10 h-10 bg-gradient-to-br from-blue-600 to-purple-600 rounded-lg flex items-center justify-center">
                        <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                    </div>
                    <div>
                        <h1 class="text-xl font-bold gradient-text">AI政策智能分析系统</h1>
                        <p class="text-xs text-gray-500">数据日期：2026年7月6日</p>
                    </div>
                </div>
                <div class="flex items-center space-x-4 no-print">
                    <button onclick="exportPDF()" class="bg-gradient-to-r from-blue-600 to-purple-600 text-white px-4 py-2 rounded-lg hover:shadow-lg transition flex items-center space-x-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                        <span>导出PDF报告</span>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <div class="bg-white border-b no-print">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex space-x-8">
                <button onclick="switchTab('domestic')" id="tab-domestic" class="tab-active py-4 px-2 text-sm font-medium text-gray-900 border-b-2 border-transparent hover:text-gray-700 transition">
                    &#127464;&#127475; 国内政策分析
                </button>
                <button onclick="switchTab('international')" id="tab-international" class="py-4 px-2 text-sm font-medium text-gray-500 border-b-2 border-transparent hover:text-gray-700 transition">
                    &#127760; 国外政策分析
                </button>
            </div>
        </div>
    </div>

    <main id="content-area" class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    </main>

    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
