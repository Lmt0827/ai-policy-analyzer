    {date:'2026-07-05',title:'EU Digital Omnibus on AI Political Agreement',level:'国家/联盟',country:'欧盟',publisher:'European Commission, European Parliament, Council of the EU',source:'https://ec.europa.eu/commission/presscorner/detail/en/mex_26_1030',highlights:['Simpler, innovation-friendly rules for AI','Maintains benefits for European society, safety and fundamental rights','Sets clear implementation timeline for businesses'],diff:'The Omnibus amends the AI Act to simplify implementation for EU businesses while maintaining core protections. Compared to the original AI Act (2024), it reduces reporting burdens for SMEs and clarifies high-risk system definitions.',tags:['EU AI Act','Omnibus','Simplification','SMEs']},

let currentTab = 'domestic';

function formatDate(dateStr) {
    const d = new Date(dateStr);
    return (d.getMonth() + 1) + '月' + d.getDate() + '日';
}

function getToday() { return '2026-07-06'; }

function switchTab(tab) {
    currentTab = tab;
    document.getElementById('tab-domestic').className = tab === 'domestic' ? 'tab-active py-4 px-2 text-sm font-medium text-gray-900 border-b-2 border-transparent hover:text-gray-700 transition' : 'py-4 px-2 text-sm font-medium text-gray-500 border-b-2 border-transparent hover:text-gray-700 transition';
    document.getElementById('tab-international').className = tab === 'international' ? 'tab-active py-4 px-2 text-sm font-medium text-gray-900 border-b-2 border-transparent hover:text-gray-700 transition' : 'py-4 px-2 text-sm font-medium text-gray-500 border-b-2 border-transparent hover:text-gray-700 transition';
    renderContent();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

function renderTimeline(policies) {
    const today = getToday();
    const todayPolicies = policies.filter(function(p) { return p.date === today; });
    const julyPolicies = policies.filter(function(p) { return p.date.startsWith('2026-07'); });
    let todayHtml = '';
    if (todayPolicies.length === 0) {
        todayHtml = '<div class="ml-8 text-gray-500 py-4">今日暂无新政策发布（截至2026年7月6日）</div>';
    } else {
        todayHtml = todayPolicies.map(function(p) {
            return '<div class="relative mb-6 ml-8"><div class="timeline-dot" style="top:4px"></div><div class="bg-blue-50 rounded-lg p-4 border-l-4 border-blue-500"><div class="flex items-center justify-between mb-2"><span class="text-sm font-semibold text-blue-700">' + formatDate(p.date) + '</span><span class="text-xs bg-blue-100 text-blue-800 px-2 py-1 rounded-full">' + p.level + '</span></div><h3 class="font-medium text-gray-900">' + p.title + '</h3><p class="text-sm text-gray-600 mt-1">' + p.publisher + '</p></div></div>';
        }).join('');
    }
    let julyHtml = julyPolicies.map(function(p) {
        return '<div class="flex items-center text-sm"><span class="w-16 text-gray-500">' + formatDate(p.date) + '</span><span class="w-2 h-2 rounded-full bg-blue-500 mx-3"></span><span class="text-gray-700 truncate">' + p.title + '</span></div>';
    }).join('');
    if (julyPolicies.length === 0) julyHtml = '<div class="text-gray-500 text-sm">本月暂无更多政策</div>';
    return '<div class="bg-white rounded-xl shadow-md p-6 mb-8"><h2 class="text-xl font-bold text-gray-900 mb-6 flex items-center"><svg class="w-6 h-6 mr-2 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>今日政策发布时间线</h2><div class="relative pl-4"><div class="timeline-line"></div>' + todayHtml + '<div class="ml-8 mt-6 pt-4 border-t border-gray-200"><h3 class="text-sm font-semibold text-gray-700 mb-3">本月发布政策一览</h3><div class="space-y-2">' + julyHtml + '</div></div></div></div>';
}

function renderDomestic() {
    const julyPolicies = domesticPolicies.filter(function(p) { return p.date.startsWith('2026-07'); });
    const otherPolicies = domesticPolicies.filter(function(p) { return !p.date.startsWith('2026-07'); });
    let julyDetails = julyPolicies.map(function(p) {
        const highlights = p.highlights.map(function(h) { return '<li>' + h + '</li>'; }).join('');
        const tags = p.tags.map(function(t) { return '<span class="keyword-tag text-xs bg-blue-50 text-blue-700 px-2 py-1 rounded-full border border-blue-200">' + t + '</span>'; }).join('');
        return '<div class="border rounded-xl p-6 card-hover bg-gradient-to-r from-white to-gray-50"><div class="flex flex-wrap items-start justify-between mb-4"><div class="flex-1"><div class="flex items-center space-x-2 mb-2"><span class="bg-red-100 text-red-800 text-xs font-semibold px-2.5 py-0.5 rounded">' + p.level + '</span><span class="bg-gray-100 text-gray-800 text-xs font-semibold px-2.5 py-0.5 rounded">' + p.region + '</span><span class="text-sm text-gray-500">' + p.date + '</span></div><h3 class="text-lg font-bold text-gray-900">' + p.title + '</h3></div></div><div class="grid md:grid-cols-2 gap-4 mb-4 text-sm"><div><span class="font-semibold text-gray-700">发布单位：</span><span class="text-gray-600">' + p.publisher + '</span></div><div><span class="font-semibold text-gray-700">监督单位：</span><span class="text-gray-600">' + p.supervisor + '</span></div></div><div class="mb-4"><h4 class="font-semibold text-gray-800 mb-2">核心要求：</h4><ul class="list-disc list-inside space-y-1 text-sm text-gray-600">' + highlights + '</ul></div><div class="bg-yellow-50 border-l-4 border-yellow-400 p-4 mb-4 rounded-r-lg"><h4 class="font-semibold text-yellow-800 mb-1">与前政策的区别：</h4><p class="text-sm text-yellow-700">' + p.diff + '</p></div><div class="flex items-center justify-between"><div class="flex flex-wrap gap-2">' + tags + '</div><a href="' + p.source + '" target="_blank" class="source-link text-sm flex items-center"><svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path></svg>数据来源</a></div></div>';
    }).join('');
    let otherDetails = otherPolicies.map(function(p) {
        return '<div class="border rounded-lg p-4 card-hover"><div class="flex items-center space-x-2 mb-2"><span class="text-xs bg-gray-100 text-gray-800 px-2 py-1 rounded">' + p.region + '</span><span class="text-xs text-gray-500">' + p.date + '</span></div><h3 class="font-medium text-gray-900 text-sm mb-2">' + p.title + '</h3><p class="text-xs text-gray-600 mb-2">发布：' + p.publisher + '</p><a href="' + p.source + '" target="_blank" class="source-link text-xs">查看来源 &rarr;</a></div>';
    }).join('');
    return '<div id="domestic-content">' + renderTimeline(domesticPolicies) + '<div class="bg-white rounded-xl shadow-md p-6 mb-8"><h2 class="text-xl font-bold text-gray-900 mb-6 flex items-center"><svg class="w-6 h-6 mr-2 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 6l3 1m0 0l-3 9a5.002 5.002 0 006.001 0M6 7l3 9M6 7l6-2m6 2l3-1m-3 1l-3 9a5.002 5.002 0 006.001 0M18 7l3 9m-3-9l-6-2m0-2v2m0 16V5m0 16H9m3 0h3"></path></svg>2026年7月国内政策详情</h2><div class="space-y-6">' + julyDetails + '</div></div><div class="bg-white rounded-xl shadow-md p-6 mb-8"><h2 class="text-xl font-bold text-gray-900 mb-6">其他地方政策（2026年6月及以前）</h2><div class="grid md:grid-cols-2 gap-4">' + otherDetails + '</div></div>' + renderCharts('domestic') + '</div>';
}

    let julyDetails = julyPolicies.map(function(p) {
        const highlights = p.highlights.map(function(h) { return '<li>' + h + '</li>'; }).join('');

}

    return '<div class="grid md:grid-cols-2 gap-6 mb-8"><div class="bg-white rounded-xl shadow-md p-6"><h3 class="text-lg font-bold text-gray-900 mb-4">政策热频关键词 TOP10</h3><div class="chart-container"><canvas id="keywordChart-' + type + '"></canvas></div></div><div class="bg-white rounded-xl shadow-md p-6"><h3 class="text-lg font-bold text-gray-900 mb-4">' + (isDomestic ? '政策发布地区分布' : '政策发布国家/地区分布') + '</h3><div class="chart-container"><canvas id="regionChart-' + type + '"></canvas></div></div></div><div class="bg-white rounded-xl shadow-md p-6 mb-8"><h3 class="text-lg font-bold text-gray-900 mb-4">政策发布月度趋势</h3><div class="chart-container"><canvas id="trendChart-' + type + '"></canvas></div></div><div class="bg-white rounded-xl shadow-md p-6 mb-8"><h3 class="text-lg font-bold text-gray-900 mb-4">政策建设热点内容摘要</h3><div class="grid md:grid-cols-3 gap-4" id="hotspots-' + type + '">' + hotspots + '</div></div>';

    const allTags = {};
    policies.forEach(function(p) { p.tags.forEach(function(t) { allTags[t] = (allTags[t] || 0) + 1; }); });
    const sortedTags = Object.entries(allTags).sort(function(a,b){return b[1]-a[1];}).slice(0,10);
    const regionDist = {};
    policies.forEach(function(p) { const key = isDomestic ? p.region : p.country; regionDist[key] = (regionDist[key] || 0) + 1; });
    const monthNames = {'2026-01':'1月','2026-02':'2月','2026-03':'3月','2026-04':'4月','2026-05':'5月','2026-06':'6月','2026-07':'7月'};
    const dateCount = {};
    policies.forEach(function(p) { const month = p.date.substring(0,7); dateCount[month] = (dateCount[month] || 0) + 1; });

function renderContent() {
    const container = document.getElementById('content-area');
    container.innerHTML = currentTab === 'domestic' ? renderDomestic() : renderInternational();
    setTimeout(function() { initCharts(currentTab); }, 100);
}

async function exportPDF() {
    const btn = document.querySelector('button[onclick="exportPDF()"]');
    const originalText = btn.innerHTML;
    btn.innerHTML = '<span>生成中...</span>';
    btn.disabled = true;
    try {
        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF('p', 'mm', 'a4');
        const pageWidth = pdf.internal.pageSize.getWidth();
        const pageHeight = pdf.internal.pageSize.getHeight();
        switchTab('domestic');
        await new Promise(function(r){setTimeout(r,1500);});
        const domesticEl = document.getElementById('domestic-content');
        const domesticCanvas = await html2canvas(domesticEl,{scale:2,useCORS:true,logging:false,windowWidth:1200});
        const domImgData = domesticCanvas.toDataURL('image/png');
        const domImgHeight = (domesticCanvas.height * pageWidth) / domesticCanvas.width;
        let heightLeft = domImgHeight;
        let position = 0;
        pdf.addImage(domImgData,'PNG',0,position,pageWidth,domImgHeight);
        heightLeft -= pageHeight;
        while (heightLeft > 0) { position = heightLeft - domImgHeight; pdf.addPage(); pdf.addImage(domImgData,'PNG',0,position,pageWidth,domImgHeight); heightLeft -= pageHeight; }
        pdf.addPage();
        switchTab('international');
        await new Promise(function(r){setTimeout(r,1500);});
        const intlEl = document.getElementById('international-content');
        const intlCanvas = await html2canvas(intlEl,{scale:2,useCORS:true,logging:false,windowWidth:1200});
        const intlImgData = intlCanvas.toDataURL('image/png');
        const intlImgHeight = (intlCanvas.height * pageWidth) / intlCanvas.width;
        heightLeft = intlImgHeight;
        position = 0;
        pdf.addImage(intlImgData,'PNG',0,position,pageWidth,intlImgHeight);
        heightLeft -= pageHeight;
        while (heightLeft > 0) { position = heightLeft - intlImgHeight; pdf.addPage(); pdf.addImage(intlImgData,'PNG',0,position,pageWidth,intlImgHeight); heightLeft -= pageHeight; }
        pdf.save('AI政策分析报告_2026年7月.pdf');
        switchTab('domestic');
    } catch (err) { console.error(err); alert('PDF生成失败：' + err.message); }
    finally { btn.innerHTML = originalText; btn.disabled = false; }
}

document.addEventListener('DOMContentLoaded', function() { renderContent(); });
</script>
